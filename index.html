<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Reviews</title>
    <link rel="icon" type="image/png" href="./images/favicon.png">
    <link rel="stylesheet" href="./css/style.css" />
    <link rel="stylesheet" href="./css/media.css" />
</head>

<body>

    <!-------- Navbar -------->
    <nav>
        <div class="nav-inner">
            <div class="logo-header">
                <img src="./images/logo.png" alt="Logo" />
                <h5>Game Reviews</h5>
            </div>
            <div class="nav-links">
                <ul>
                    <li><a href="#">mmorpg</a></li>
                    <li><a href="#">shooter</a></li>
                    <li><a href="#">sailing</a></li>
                    <li><a href="#">permadeath</a></li>
                    <li><a href="#">superhero</a></li>
                    <li><a href="#">pixel</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-------- Games Cards -------->
    <div class="games-cards">
        <div class="container">

            <div class="outer-card">
                <div class="inner-card">
                    <div class="main">
                        <figure>
                            <img src="./images/thumbnail.jpg" alt="Game Cover" />
                        </figure>
                        <figcaption>
                            <div>
                                <h3>Lost Ark</h3>
                                <span>Free</span>
                            </div>
                            <p>Smilegate’s,free-to-play,multiplayer,ARPG,is,a,massive,adventure</p>
                        </figcaption>
                    </div>
                    <footer>
                        <span>ARPG</span>
                        <span>PC (Windows)</span>
                    </footer>
                </div>
            </div>

        </div>
    </div>

    <script src="./js/main.js"></script>
</body>

</html>
